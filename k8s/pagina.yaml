apiVersion: apps/v1
kind: Deployment
metadata:
  name: pagina
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pagina
  template:
    metadata:
      labels:
        app: pagina
    spec:
      containers:
        - name: pagina
          image: premier-pagina:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pagina
spec:
  type: NodePort
  selector:
    app: pagina
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30300
